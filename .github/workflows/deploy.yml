name: Deploy Titipin Production

on:
  push:
    branches:
      - main
      - feature/social-auth

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: titip-in/titip-in-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-vm:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Update local repository
        run: |
          cd ~/titip-in-web
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Pull latest Docker images
        run: |
          cd ~/titip-in-web
          sudo docker compose -f docker-compose.prod.yaml pull

      - name: Restart services with new images
        run: |
          cd ~/titip-in-web
          sudo docker compose -f docker-compose.prod.yaml up -d

      - name: Clean up unused Docker images
        run: sudo docker image prune -a -f