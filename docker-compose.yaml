services:
  web:
    build:
      context: .
      target: web
    container_name: ${COMPOSE_PROJECT_NAME:-app}_web
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - app_storage:/var/www/html/public/storage:ro
    depends_on:
      - php

  php:
    build:
      context: .
      target: app
    container_name: ${COMPOSE_PROJECT_NAME:-app}_php
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      - app_storage:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      target: app
    container_name: ${COMPOSE_PROJECT_NAME:-app}_worker
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    command: >
      sh -c "
        until PGPASSWORD=\"$DB_PASSWORD\" pg_isready -h \"$DB_HOST\" -U \"$DB_USERNAME\" -d \"$DB_DATABASE\" -q; do sleep 2; done;
        until redis-cli -h \"$REDIS_HOST\" -p \"$REDIS_PORT\" ping 2>/dev/null | grep -q PONG; do sleep 2; done;
        exec php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --verbose
      "
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      target: app
    container_name: ${COMPOSE_PROJECT_NAME:-app}_scheduler
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    command: >
      sh -c "
        until PGPASSWORD=\"$DB_PASSWORD\" pg_isready -h \"$DB_HOST\" -U \"$DB_USERNAME\" -d \"$DB_DATABASE\" -q; do sleep 2; done;
        until redis-cli -h \"$REDIS_HOST\" -p \"$REDIS_PORT\" ping 2>/dev/null | grep -q PONG; do sleep 2; done;
        while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done
      "
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: pgvector/pgvector:pg16
    container_name: ${COMPOSE_PROJECT_NAME:-app}_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-app}_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}_pgadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  minio:
    image: minio/minio
    container_name: ${COMPOSE_PROJECT_NAME:-app}_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-titipin_minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-titipin_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc
    container_name: ${COMPOSE_PROJECT_NAME:-app}_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${AWS_ACCESS_KEY_ID:-titipin_minio} ${AWS_SECRET_ACCESS_KEY:-titipin_secret};
      mc mb myminio/${AWS_BUCKET:-titipin-bucket} --ignore-existing;
      mc anonymous set public myminio/${AWS_BUCKET:-titipin-bucket};
      exit 0;
      "

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}_evolution_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-titipin_wa_secret_123}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${DB_USERNAME}:${DB_PASSWORD}@db:5432/${DB_DATABASE}?schema=evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
    ports:
      - "8084:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - evolution_instances:/evolution/instances

  evolution-manager:
    image: evoapicloud/evolution-manager:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}_evolution_manager
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      - evolution-api
    entrypoint: ["/bin/sh", "-c"]
    command: ["sed -i 's/ must-revalidate//g' /etc/nginx/conf.d/nginx.conf && nginx -g 'daemon off;'"]

volumes:
  pg_data:
  app_storage:
  minio_data:
  evolution_instances:
  evolution_store: