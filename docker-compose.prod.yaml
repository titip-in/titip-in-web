services:
  web:
    image: ghcr.io/titip-in/titip-in-web-web:latest
    container_name: ${COMPOSE_PROJECT_NAME:-titipin}_web
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - app_storage:/var/www/html/public/storage:ro
    depends_on:
      - php

  php:
    image: ghcr.io/titip-in/titip-in-web-app:latest
    container_name: ${COMPOSE_PROJECT_NAME:-titipin}_php
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app_storage:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    image: ghcr.io/titip-in/titip-in-web-app:latest
    container_name: ${COMPOSE_PROJECT_NAME:-titipin}_worker
    restart: unless-stopped
    command: >
      sh -c "
        until PGPASSWORD=\"$$DB_PASSWORD\" pg_isready -h \"$$DB_HOST\" -U \"$$DB_USERNAME\" -d \"$$DB_DATABASE\" -q; do sleep 2; done;
        until redis-cli -h \"$$REDIS_HOST\" -p \"$$REDIS_PORT\" ping 2>/dev/null | grep -q PONG; do sleep 2; done;
        exec php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --verbose
      "
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    image: ghcr.io/titip-in/titip-in-web-app:latest
    container_name: ${COMPOSE_PROJECT_NAME:-titipin}_scheduler
    restart: unless-stopped
    command: >
      sh -c "
        until PGPASSWORD=\"$$DB_PASSWORD\" pg_isready -h \"$$DB_HOST\" -U \"$$DB_USERNAME\" -d \"$$DB_DATABASE\" -q; do sleep 2; done;
        until redis-cli -h \"$$REDIS_HOST\" -p \"$$REDIS_PORT\" ping 2>/dev/null | grep -q PONG; do sleep 2; done;
        while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done
      "
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: pgvector/pgvector:pg16
    container_name: ${COMPOSE_PROJECT_NAME:-titipin}_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-titipin}_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  minio:
    image: minio/minio:RELEASE.2023-04-20T17-56-55Z
    container_name: ${COMPOSE_PROJECT_NAME:-titipin}_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-titipin_minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-titipin_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc:latest
    container_name: ${COMPOSE_PROJECT_NAME:-titipin}_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${AWS_ACCESS_KEY_ID:-titipin_minio} ${AWS_SECRET_ACCESS_KEY:-titipin_secret};
      mc mb myminio/${AWS_BUCKET:-titipin-bucket} --ignore-existing;
      mc anonymous set public myminio/${AWS_BUCKET:-titipin-bucket};
      exit 0;
      "

volumes:
  pg_data:
  app_storage:
  minio_data: